```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickUpPal</title>

<style>
body{font-family:Arial;margin:0;background:#f5f6fa}
header{background:#6b5cff;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:8px}
button{padding:6px 10px;margin:3px;border:none;border-radius:5px;background:#6b5cff;color:#fff}
.small{font-size:12px;color:#555}
.chatBox{max-height:150px;overflow:auto;background:#eee;padding:5px;margin-top:5px}
.message{background:#fff;padding:5px;margin:3px;border-radius:4px}
nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
nav button{flex:1;padding:10px}
.screen{display:none;padding-bottom:80px}
.active{display:block}
.star{color:gold}
</style>
</head>

<body>

<header>🚗 PickUpPal</header>

<div class="container">

<div id="today" class="screen active">
<div class="card">
<h3>Lift Matches</h3>
<div id="matches"></div>
</div>
</div>

<div id="lifts" class="screen">
<div class="card">
<input id="parentName" placeholder="Your Name">
<input type="time" id="liftTime">
<input id="liftDest" placeholder="Destination">
<input id="liftNotes" placeholder="Notes">
<button onclick="addLift()">Request Lift</button>
</div>

<div id="liftList"></div>
</div>

</div>

<nav>
<button onclick="show('today')">Matches</button>
<button onclick="show('lifts')">Lift-Share</button>
</nav>

<script>

const get=k=>JSON.parse(localStorage.getItem(k)||"[]")
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v))

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

// ADD LIFT
function addLift(){
let lifts=get("lifts")
lifts.push({
id:Date.now(),
parent:parentName.value,
time:liftTime.value,
dest:liftDest.value,
notes:liftNotes.value,
accepted:[],
chat:[],
ratings:[]
})
set("lifts",lifts)
render()
}

// ACCEPT
function acceptLift(id){
let lifts=get("lifts")
let me=parentName.value

lifts=lifts.map(l=>{
if(l.id==id && !l.accepted.includes(me)){
l.accepted.push(me)
}
return l
})

set("lifts",lifts)
render()
}

// DECLINE
function declineLift(id){
alert("Declined")
}

// CHAT
function sendMessage(id,inputId){
let lifts=get("lifts")
let msg=document.getElementById(inputId).value
let me=parentName.value

lifts=lifts.map(l=>{
if(l.id==id){
l.chat.push({user:me,text:msg})
}
return l
})

set("lifts",lifts)
render()
}

// RATE
function rate(id,stars){
let lifts=get("lifts")
let me=parentName.value

lifts=lifts.map(l=>{
if(l.id==id){
l.ratings.push({user:me,stars})
}
return l
})

set("lifts",lifts)
render()
}

// RENDER
function render(){

let lifts=get("lifts")

// LIST
liftList.innerHTML=""

lifts.forEach(l=>{

let avg=0
if(l.ratings.length){
avg=(l.ratings.reduce((a,b)=>a+b.stars,0)/l.ratings.length).toFixed(1)
}

let chatHTML=l.chat.map(c=>`<div class="message">${c.user}: ${c.text}</div>`).join("")

liftList.innerHTML+=`
<div class="card">
<b>${l.parent}</b> (${l.time} → ${l.dest})<br>
<span class="small">${l.notes}</span><br>

<button onclick="acceptLift(${l.id})">Accept</button>
<button onclick="declineLift(${l.id})">Decline</button>

<div>⭐ ${avg||"No ratings yet"}</div>

<div>
Rate:
<button onclick="rate(${l.id},5)">5⭐</button>
<button onclick="rate(${l.id},4)">4⭐</button>
<button onclick="rate(${l.id},3)">3⭐</button>
</div>

<div class="chatBox">${chatHTML}</div>
<input id="msg${l.id}" placeholder="Message">
<button onclick="sendMessage(${l.id},'msg${l.id}')">Send</button>

</div>
`

})

// MATCHES
let matchMap={}

lifts.forEach(l=>{
let key=l.time+"-"+l.dest
if(!matchMap[key])matchMap[key]=[]
matchMap[key].push(l.parent)
})

matches.innerHTML=""

Object.keys(matchMap).forEach(k=>{
if(matchMap[k].length>1){
matches.innerHTML+=`
<div class="card">
🚗 Match (${k})<br>
${matchMap[k].join(", ")}
</div>`
}
})

}

render()

</script>

</body>
</html>
```
