```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickUpPal</title>

<style>
body{font-family:Arial;margin:0;background:#f6f6fb}

header{
background:#6b5cff;
color:white;
padding:16px;
text-align:center;
font-size:20px
}

.container{padding:20px}

.card{
background:white;
padding:16px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

.childCard{
background:#fff;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border-left:5px solid #6b5cff;
display:flex;
justify-content:space-between;
align-items:center
}

button{
background:#6b5cff;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer
}

.deleteBtn{background:#ff4d4d}

input{
width:100%;
padding:8px;
margin:6px 0 10px 0
}

nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
border-top:1px solid #ddd
}

nav button{
flex:1;
padding:14px;
background:none;
color:#444;
font-size:16px
}

nav button.activeTab{
font-weight:bold;
color:#6b5cff
}

.screen{
display:none;
padding-bottom:80px
}

.active{display:block}

.scheduleRow{
display:flex;
justify-content:space-between;
margin-bottom:10px
}

.liftCard{
background:#eef0ff;
padding:10px;
margin-bottom:10px;
border-radius:8px
}
</style>
</head>

<body>

<header>🚗 PickUpPal</header>

<div class="container">

<div id="today" class="screen active">

<div class="card">
<h3>Today's Pickups</h3>
<div id="pickupList"></div>
</div>

<div class="card">
<h3>Override Pickup Time</h3>
<input type="time" id="overrideTime">
<button onclick="overridePickup()">Update Time</button>
</div>

</div>

<div id="children" class="screen">

<div class="card">
<h3>Add Child</h3>

<input id="childName" placeholder="Child name">
<input id="schoolName" placeholder="School">
<input type="time" id="pickupTime">

<button onclick="addChild()">Save</button>

</div>

<div class="card">
<h3>Your Children</h3>
<div id="childrenList"></div>
</div>

</div>

<div id="schedule" class="screen">

<div class="card">
<h3>Weekly Schedule</h3>

<div class="scheduleRow">Monday <input type="time" id="mon"></div>
<div class="scheduleRow">Tuesday <input type="time" id="tue"></div>
<div class="scheduleRow">Wednesday <input type="time" id="wed"></div>
<div class="scheduleRow">Thursday <input type="time" id="thu"></div>
<div class="scheduleRow">Friday <input type="time" id="fri"></div>

<button onclick="saveSchedule()">Save Weekly Schedule</button>

</div>

</div>

<div id="liftshare" class="screen">

<div class="card">
<h3>Offer or Request a Lift</h3>

<input id="parentName" placeholder="Parent name">
<input id="schoolLift" placeholder="School name">

<select id="liftType">
<option value="offer">Offering a lift</option>
<option value="request">Need a lift</option>
</select>

<button onclick="addLift()">Post Lift</button>

</div>

<div class="card">
<h3>Lift Board</h3>
<div id="liftBoard"></div>
</div>

</div>

</div>

<nav>
<button onclick="showScreen('today',this)" class="activeTab">Today</button>
<button onclick="showScreen('children',this)">Children</button>
<button onclick="showScreen('schedule',this)">Schedule</button>
<button onclick="showScreen('liftshare',this)">Lift-Share</button>
</nav>

<script>

function showScreen(id,btn){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
document.querySelectorAll("nav button").forEach(b=>b.classList.remove("activeTab"))
btn.classList.add("activeTab")
}

function getChildren(){
return JSON.parse(localStorage.getItem("pickuppal_children")||"[]")
}

function saveChildren(children){
localStorage.setItem("pickuppal_children",JSON.stringify(children))
renderChildren()
}

function addChild(){

let name=childName.value
let school=schoolName.value
let time=pickupTime.value

if(!name||!time)return

let children=getChildren()

children.push({name,school,time})

saveChildren(children)

childName.value=""
schoolName.value=""
pickupTime.value=""
}

function deleteChild(index){

let children=getChildren()
children.splice(index,1)
saveChildren(children)

}

function renderChildren(){

let children=getChildren()

childrenList.innerHTML=""
pickupList.innerHTML=""

children.forEach((c,i)=>{

childrenList.innerHTML+=`
<div class="childCard">
<div>
<b>${c.name}</b><br>
${c.school}<br>
Pickup ${c.time}<br>
<button onclick="openMap('${c.school}')">Navigate</button>
</div>
<button class="deleteBtn" onclick="deleteChild(${i})">Delete</button>
</div>
`

pickupList.innerHTML+=`
<div class="childCard">
👧 <b>${c.name}</b> – pickup ${c.time}
</div>
`

})

}

function openMap(school){

let url="https://www.google.com/maps/search/"+encodeURIComponent(school)

window.open(url,"_blank")

}

function playChime(){

let ctx=new (window.AudioContext||window.webkitAudioContext)()
let o=ctx.createOscillator()
let g=ctx.createGain()

o.type="sine"
o.frequency.value=880

o.connect(g)
g.connect(ctx.destination)

o.start()

g.gain.exponentialRampToValueAtTime(0.00001,ctx.currentTime+0.6)

}

function overridePickup(){

let newTime=overrideTime.value

if(!newTime)return

let children=getChildren()

children=children.map(c=>({...c,time:newTime}))

saveChildren(children)

playChime()

}

function saveSchedule(){

let schedule={
mon:mon.value,
tue:tue.value,
wed:wed.value,
thu:thu.value,
fri:fri.value
}

localStorage.setItem("pickuppal_schedule",JSON.stringify(schedule))

playChime()

}

function getLifts(){
return JSON.parse(localStorage.getItem("pickuppal_lifts")||"[]")
}

function addLift(){

let parent=parentName.value
let school=schoolLift.value
let type=liftType.value

if(!parent||!school)return

let lifts=getLifts()

lifts.push({parent,school,type})

localStorage.setItem("pickuppal_lifts",JSON.stringify(lifts))

renderLifts()

parentName.value=""
schoolLift.value=""
}

function renderLifts(){

let lifts=getLifts()

liftBoard.innerHTML=""

lifts.forEach(l=>{

liftBoard.innerHTML+=`
<div class="liftCard">
<b>${l.parent}</b><br>
${l.type=="offer"?"Offering lift":"Needs lift"}<br>
School: ${l.school}<br>
<button onclick="openMap('${l.school}')">Navigate</button>
</div>
`

})

}

renderChildren()
renderLifts()

</script>

</body>
</html>
```
