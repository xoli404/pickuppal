<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickUpPal</title>

<style>
body{font-family:Arial;margin:0;background:#f5f6fa}
header{background:#6b5cff;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:8px}
button{padding:6px 10px;margin:3px;border:none;border-radius:5px;background:#6b5cff;color:#fff}
input,select{width:100%;padding:6px;margin:5px 0}
nav{position:fixed;bottom:0;width:100%;display:flex;background:#fff}
nav button{flex:1;padding:10px}
.screen{display:none;padding-bottom:80px}
.active{display:block}
.chatBox{max-height:120px;overflow:auto;background:#eee;padding:5px}
.message{background:#fff;padding:5px;margin:3px;border-radius:4px}
.status{font-size:12px;color:#666;margin-top:5px}
</style>
</head>

<body>

<header>🚗 PickUpPal</header>

<div class="container">

<div id="today" class="screen active">
<div class="card">
<h3>Today's Schedule</h3>
<div id="todayList"></div>
</div>

<div class="card">
<h3>🚗 Matches</h3>
<div id="matchList"></div>
</div>
</div>

<div id="children" class="screen">
<div class="card">
<input id="childName" placeholder="Child name">
<button onclick="addChild()">Add Child</button>
</div>
<div id="childrenList"></div>
</div>

<div id="schedule" class="screen">
<div class="card">
<select id="eventChild"></select>
<input type="time" id="eventTime">
<input id="eventTitle" placeholder="Event">
<input id="eventNotes" placeholder="Notes">
<button onclick="addEvent()">Add Event</button>
</div>
<div id="eventList"></div>
</div>

<div id="lifts" class="screen">
<div class="card">
<input id="parentName" placeholder="Your Name">
<select id="liftChild"></select>
<input type="time" id="liftTime">
<input id="liftDest" placeholder="Destination">
<input id="liftNotes" placeholder="Notes">
<button onclick="addLift()">Request Lift</button>
</div>
<div id="liftList"></div>
</div>

</div>

<nav>
<button onclick="show('today')">Today</button>
<button onclick="show('children')">Children</button>
<button onclick="show('schedule')">Schedule</button>
<button onclick="show('lifts')">Lift</button>
</nav>

<script>

const get=k=>JSON.parse(localStorage.getItem(k)||"[]")
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v))

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function addChild(){
let c=get("children")
c.push({name:childName.value})
set("children",c)
childName.value=""
render()
}

function addEvent(){
let e=get("events")
e.push({
child:eventChild.value,
time:eventTime.value,
title:eventTitle.value,
notes:eventNotes.value
})
set("events",e)
render()
}

function addLift(){
let l=get("lifts")
l.push({
id:Date.now(),
parent:parentName.value,
child:liftChild.value,
time:liftTime.value,
dest:liftDest.value,
notes:liftNotes.value,
accepted:[],
chat:[],
status:"open",
ratings:[]
})
set("lifts",l)
render()
}

function acceptLift(id){
let lifts=get("lifts")
let me=parentName.value
lifts=lifts.map(l=>{
if(l.id==id && !l.accepted.includes(me)){
l.accepted.push(me)
}
return l
})
set("lifts",lifts)
render()
}

function confirmTrip(id){
let lifts=get("lifts")
lifts=lifts.map(l=>{
if(l.id==id){l.status="confirmed"}
return l
})
set("lifts",lifts)
render()
}

function startTrip(id){
let lifts=get("lifts")
lifts=lifts.map(l=>{
if(l.id==id){l.status="in_progress"}
return l
})
set("lifts",lifts)
render()
}

function completeTrip(id){
let lifts=get("lifts")
lifts=lifts.map(l=>{
if(l.id==id){l.status="completed"}
return l
})
set("lifts",lifts)
render()
}

function rateTrip(id,stars){
let lifts=get("lifts")
let me=parentName.value

lifts=lifts.map(l=>{
if(l.id==id && l.status==="completed"){
l.ratings.push({user:me,stars})
}
return l
})

set("lifts",lifts)
render()
}

function sendMsg(id,inputId){
let lifts=get("lifts")
let msg=document.getElementById(inputId).value
let me=parentName.value

lifts=lifts.map(l=>{
if(l.id==id){
l.chat.push({user:me,text:msg})
}
return l
})

set("lifts",lifts)
render()
}

function render(){

let children=get("children")
let events=get("events")
let lifts=get("lifts")

childrenList.innerHTML=""
eventChild.innerHTML=""
liftChild.innerHTML=""

children.forEach((c,i)=>{
childrenList.innerHTML+=`<div class="card">${c.name}</div>`
eventChild.innerHTML+=`<option value="${i}">${c.name}</option>`
liftChild.innerHTML+=`<option value="${i}">${c.name}</option>`
})

eventList.innerHTML=""
events.forEach(e=>{
let name=children[e.child]?.name
eventList.innerHTML+=`
<div class="card">
<b>${name}</b> - ${e.time}<br>
${e.title}<br>
<small>${e.notes||""}</small>
</div>`
})

todayList.innerHTML=""
children.forEach((c,i)=>{
let ev=events.filter(e=>e.child==i)
if(ev.length){
todayList.innerHTML+=`<b>${c.name}</b>`
ev.forEach(e=>{
todayList.innerHTML+=`<div>${e.time} - ${e.title}</div>`
})
}
})

liftList.innerHTML=""
lifts.forEach(l=>{
let name=children[l.child]?.name

let chatHTML=l.chat.map(c=>`<div class="message">${c.user}: ${c.text}</div>`).join("")

let avg="No ratings"
if(l.ratings.length){
avg=(l.ratings.reduce((a,b)=>a+b.stars,0)/l.ratings.length).toFixed(1)
}

liftList.innerHTML+=`
<div class="card">
<b>${l.parent}</b> (${l.time} → ${l.dest})<br>
Child: ${name}<br>
<small>${l.notes}</small><br>

<div class="status">Status: ${l.status}</div>

<button onclick="acceptLift(${l.id})">Accept</button>
<button onclick="confirmTrip(${l.id})">Confirm</button>
<button onclick="startTrip(${l.id})">Start</button>
<button onclick="completeTrip(${l.id})">Complete</button>

<div>⭐ ${avg}</div>

${l.status==="completed" ? `
<div>
Rate:
<button onclick="rateTrip(${l.id},5)">5⭐</button>
<button onclick="rateTrip(${l.id},4)">4⭐</button>
<button onclick="rateTrip(${l.id},3)">3⭐</button>
</div>`:""}

<div class="chatBox">${chatHTML}</div>
<input id="msg${l.id}" placeholder="Message">
<button onclick="sendMsg(${l.id},'msg${l.id}')">Send</button>
</div>
`
})

let matchMap={}
lifts.forEach(l=>{
let key=l.time+"-"+l.dest
if(!matchMap[key])matchMap[key]=[]
matchMap[key].push(l.parent)
})

matchList.innerHTML=""
Object.keys(matchMap).forEach(k=>{
if(matchMap[k].length>1){
matchList.innerHTML+=`
<div class="card">
🚗 Match (${k})<br>
${matchMap[k].join(", ")}
</div>`
}
})

}

render()

</script>

</body>
</html>
