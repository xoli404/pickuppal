<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PickUpPal</title>

<style>
body{font-family:Arial;margin:0;background:#f5f6fa}
header{background:#6b5cff;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:12px;margin-bottom:12px;border-radius:8px}
button{padding:6px 10px;margin:3px;border:none;border-radius:5px;background:#6b5cff;color:#fff}
.deleteBtn{background:#ff4d4d}
input,select{width:100%;padding:6px;margin:5px 0}

nav{position:fixed;bottom:0;width:100%;display:flex;background:#6b5cff}
nav button{flex:1;padding:12px;background:#6b5cff;color:#fff}
nav button.active{background:#fff;color:#6b5cff;font-weight:bold}

.screen{display:none;padding-bottom:80px}
.activeScreen{display:block}

.chatBox{max-height:120px;overflow:auto;background:#eee;padding:5px}
.message{background:#fff;padding:5px;margin:3px;border-radius:4px}
.status{font-size:12px;color:#666;margin-top:5px}
</style>
</head>

<body>

<header>🚗 PickUpPal</header>

<div class="container">

<!-- TODAY -->
<div id="today" class="screen activeScreen">
<div id="todayList"></div>
</div>

<!-- CHILDREN -->
<div id="children" class="screen">
<div class="card">
<input id="childName" placeholder="Child name">
<button onclick="addChild()">Add Child</button>
</div>
<div id="childrenList"></div>
</div>

<!-- SCHEDULE -->
<div id="schedule" class="screen">
<div class="card">
<select id="eventChild"></select>
<input type="time" id="eventTime">
<input id="eventTitle" placeholder="Event">
<input id="eventNotes" placeholder="Notes">
<button onclick="addEvent()">Add Event</button>
</div>
<div id="eventList"></div>
</div>

<!-- LIFTS -->
<div id="lifts" class="screen">
<div class="card">
<input id="parentName" placeholder="Your Name">
<select id="liftChild"></select>
<input type="time" id="liftTime">
<input id="liftDest" placeholder="Destination">
<input id="liftNotes" placeholder="Notes">
<button onclick="addLift()">Request Lift</button>
</div>

<div id="matchList"></div>
<div id="liftList"></div>
</div>

</div>

<nav>
<button onclick="show('today',this)" class="active">Today</button>
<button onclick="show('children',this)">Children</button>
<button onclick="show('schedule',this)">Schedule</button>
<button onclick="show('lifts',this)">Lift</button>
</nav>

<script>

const get=k=>JSON.parse(localStorage.getItem(k)||"[]")
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v))

function show(id,btn){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("activeScreen"))
document.getElementById(id).classList.add("activeScreen")

document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
}

// CHILD
function addChild(){
let c=get("children")
c.push({name:childName.value})
set("children",c)
childName.value=""
render()
}

function deleteChild(i){
let c=get("children")
c.splice(i,1)
set("children",c)
render()
}

// EVENT
function addEvent(){
let e=get("events")
e.push({
child:eventChild.value,
time:eventTime.value,
title:eventTitle.value,
notes:eventNotes.value
})
set("events",e)
render()
}

// LIFT
function addLift(){
let l=get("lifts")
l.push({
id:Date.now(),
parent:parentName.value,
child:liftChild.value,
time:liftTime.value,
dest:liftDest.value,
notes:liftNotes.value,
accepted:[],
chat:[],
status:"open"
})
set("lifts",l)
render()
}

// FLOW
function acceptLift(id){
let lifts=get("lifts")
let me=parentName.value
lifts.forEach(l=>{
if(l.id==id && !l.accepted.includes(me)){
l.accepted.push(me)
}
})
set("lifts",lifts)
render()
}

function confirmTrip(id){updateStatus(id,"confirmed")}
function startTrip(id){updateStatus(id,"in_progress")}
function completeTrip(id){updateStatus(id,"completed")}

function updateStatus(id,status){
let lifts=get("lifts")
lifts.forEach(l=>{
if(l.id==id){l.status=status}
})
set("lifts",lifts)
render()
}

// CHAT
function sendMsg(id,inputId){
let lifts=get("lifts")
let msg=document.getElementById(inputId).value
let me=parentName.value

if(!msg) return

lifts.forEach(l=>{
if(l.id==id){
l.chat.push({user:me,text:msg})
}
})

set("lifts",lifts)
render()
}

// RENDER
function render(){

let children=get("children")
let events=get("events")
let lifts=get("lifts")

// CHILDREN
childrenList.innerHTML=""
eventChild.innerHTML=""
liftChild.innerHTML=""

children.forEach((c,i)=>{
childrenList.innerHTML+=`
<div class="card">
${c.name}
<button class="deleteBtn" onclick="deleteChild(${i})">Delete</button>
</div>`
eventChild.innerHTML+=`<option value="${i}">${c.name}</option>`
liftChild.innerHTML+=`<option value="${i}">${c.name}</option>`
})

// TODAY (FIXED)
todayList.innerHTML=""
children.forEach((c,i)=>{
let ev=events.filter(e=>e.child==i).sort((a,b)=>a.time.localeCompare(b.time))
if(ev.length){
todayList.innerHTML+=`<div class="card"><b>${c.name}</b>`
ev.forEach(e=>{
todayList.innerHTML+=`<div>${e.time} - ${e.title}</div>`
})
todayList.innerHTML+=`</div>`
}
})

// EVENTS LIST
eventList.innerHTML=""
events.forEach(e=>{
let name=children[e.child]?.name
eventList.innerHTML+=`
<div class="card">
<b>${name}</b> - ${e.time}<br>
${e.title}<br>
<small>${e.notes||""}</small>
</div>`
})

// MATCHES (ONLY IN LIFT TAB)
matchList.innerHTML=""
let matchMap={}

lifts.forEach(l=>{
let key=l.time+"-"+l.dest
if(!matchMap[key])matchMap[key]=[]
matchMap[key].push(l.parent)
})

Object.keys(matchMap).forEach(k=>{
if(matchMap[k].length>1){
matchList.innerHTML+=`
<div class="card">
🚗 Match (${k})<br>
${matchMap[k].join(", ")}
</div>`
}
})

// LIFTS
liftList.innerHTML=""
lifts.forEach(l=>{
let name=children[l.child]?.name

let chatHTML=l.chat.map(c=>`<div class="message">${c.user}: ${c.text}</div>`).join("")

liftList.innerHTML+=`
<div class="card">
<b>${l.parent}</b> (${l.time} → ${l.dest})<br>
Child: ${name}<br>
<small>${l.notes}</small><br>

<div class="status">Status: ${l.status}</div>

<button onclick="acceptLift(${l.id})">Accept</button>
<button onclick="confirmTrip(${l.id})">Confirm</button>
<button onclick="startTrip(${l.id})">Start</button>
<button onclick="completeTrip(${l.id})">Complete</button>

<div class="chatBox">${chatHTML}</div>
<input id="msg${l.id}" placeholder="Message">
<button onclick="sendMsg(${l.id},'msg${l.id}')">Send</button>
</div>
`
})

}

render()

</script>

</body>
</html>
