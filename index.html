```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PickUpPal</title>

<style>
body{font-family:Arial;margin:0;background:#f6f6fb}
header{background:#6b5cff;color:white;padding:16px;text-align:center}
.container{padding:20px}
.card{background:white;padding:16px;margin-bottom:15px;border-radius:10px}
button{background:#6b5cff;color:white;border:none;padding:8px;border-radius:6px}
input,select{width:100%;padding:8px;margin:5px 0}
nav{position:fixed;bottom:0;width:100%;display:flex;background:white}
nav button{flex:1;padding:12px}
.screen{display:none;padding-bottom:80px}
.active{display:block}
.match{background:#e8f7ff;padding:10px;margin-top:10px;border-radius:6px}
</style>
</head>

<body>

<header>🚗 PickUpPal</header>

<div class="container">

<!-- TODAY -->
<div id="today" class="screen active">
<div class="card">
<h3>Today's Schedule</h3>
<div id="todayList"></div>
</div>

<div class="card">
<h3>🚗 Lift Matches</h3>
<div id="matchList"></div>
</div>
</div>

<!-- CHILDREN -->
<div id="children" class="screen">
<div class="card">
<input id="childName" placeholder="Child Name">
<button onclick="addChild()">Add</button>
</div>
<div id="childrenList"></div>
</div>

<!-- SCHEDULE -->
<div id="schedule" class="screen">
<div class="card">
<select id="eventChild"></select>
<input type="time" id="eventTime">
<input id="eventTitle" placeholder="What is happening?">
<input id="eventNotes" placeholder="Notes (optional)">
<button onclick="addEvent()">Add Event</button>
</div>
<div id="eventList"></div>
</div>

<!-- LIFTS -->
<div id="lifts" class="screen">
<div class="card">
<select id="liftChild"></select>
<input type="time" id="liftTime">
<input id="liftDestination" placeholder="Destination (School/Home)">
<input id="liftNotes" placeholder="Notes (e.g. kit bag)">
<button onclick="addLift()">Request Lift</button>
</div>
<div id="liftList"></div>
</div>

</div>

<nav>
<button onclick="show('today')">Today</button>
<button onclick="show('children')">Children</button>
<button onclick="show('schedule')">Schedule</button>
<button onclick="show('lifts')">Lift-Share</button>
</nav>

<script>

// NAV
function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

// STORAGE
const get=(k)=>JSON.parse(localStorage.getItem(k)||"[]")
const set=(k,v)=>localStorage.setItem(k,JSON.stringify(v))

// CHILD
function addChild(){
let c=get("children")
c.push({name:childName.value})
set("children",c)
childName.value=""
render()
}

// EVENT
function addEvent(){
let e=get("events")
e.push({
child:eventChild.value,
time:eventTime.value,
title:eventTitle.value,
notes:eventNotes.value
})
set("events",e)
render()
}

// LIFT
function addLift(){
let l=get("lifts")
l.push({
child:liftChild.value,
time:liftTime.value,
dest:liftDestination.value,
notes:liftNotes.value
})
set("lifts",l)
render()
}

// RENDER
function render(){

let children=get("children")
let events=get("events")
let lifts=get("lifts")

// dropdowns
eventChild.innerHTML=""
liftChild.innerHTML=""
children.forEach((c,i)=>{
eventChild.innerHTML+=`<option value="${i}">${c.name}</option>`
liftChild.innerHTML+=`<option value="${i}">${c.name}</option>`
})

// TODAY
todayList.innerHTML=""
children.forEach((c,i)=>{
let ev=events.filter(e=>e.child==i)
if(ev.length){
todayList.innerHTML+=`<b>${c.name}</b>`
ev.forEach(e=>{
todayList.innerHTML+=`<div>${e.time} - ${e.title}<br><small>${e.notes||""}</small></div>`
})
}
})

// LIFTS
liftList.innerHTML=""
lifts.forEach(l=>{
let name=children[l.child]?.name
liftList.innerHTML+=`
<div>
${name} - ${l.time} → ${l.dest}<br>
<small>${l.notes}</small>
</div>`
})

// MATCHING ENGINE 🔥
let matches={}

lifts.forEach(l=>{
let key=l.time+"-"+l.dest
if(!matches[key])matches[key]=[]
matches[key].push(children[l.child]?.name)
})

matchList.innerHTML=""

Object.keys(matches).forEach(k=>{
if(matches[k].length>1){
matchList.innerHTML+=`
<div class="match">
🚗 Match (${k})<br>
${matches[k].join(", ")}
</div>`
}
})

}

render()

</script>

</body>
</html>
```
